<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>落入異世界重生的老套劇情，此時你該如何破關？</title>
    <style>
    body { 
        background-color: #0a0a12; 
        color: #142b49; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
        font-family: "Microsoft JhengHei", sans-serif;
    }

    #game-box {
        width: 80%;
        max-width: 600px;
        padding: 40px;
        background-color: #9EACB0; 
        border: 2px solid #142b49;
        border-radius: 10px; 
        text-align: center; 
        position: relative;
    }

    #text-display {
        font-size: 1.3rem;
        line-height: 1.8;
        margin-bottom: 10px; 
        min-height: 100px;
    }


    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(5px); }
        100% { transform: translateY(0px); }
    }

    #options-container {
        display: flex;
        flex-direction: column; 
        gap: 15px; 
        width: 100%;
        margin-top: 10px;
    }
   

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(151, 183, 255, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(151, 183, 255, 0); }
        100% { box-shadow: 0 0 0 0 rgba(151, 183, 255, 0); }
    }

    /* --- 彈窗樣式 --- */
    .modal {
        position: fixed; 
        z-index: 100; 
        left: 0; top: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.85);
        display: none; 
        justify-content: center;
        align-items: center;
    }

    .modal.show { display: flex; }

    .modal-content {
        background-color: #1a1a1a;
        padding: 20px;
        border-radius: 10px;
        border: 2px solid #52656C;
        text-align: center;
        max-width: 90%;
        position: relative;
    }

    .modal-content img {
        width: 300px;
        height: auto;
        border-radius: 5px;
        margin-top: 10px;
    }

    .close-modal {
        position: absolute;
        top: 10px; right: 15px;
        color: #aaa;
        font-size: 28px;
        cursor: pointer;
    }

    #game-controls {
            
        /* 1. 改為相對定位或調整絕對定位的邊距 */
        position: absolute;
        top: 20px;   /* 增加與頂部的距離 */
        left: 20px;  /* 增加與左側的距離 */
        
        /* 2. 確保按鈕橫向排開 */
        display: flex; 
        flex-direction: row; 
        gap: 12px;   /* 增加按鈕之間的間距 */
        
        /* 3. 確保它不會蓋到下方的劇情文字 */
        z-index: 10;
    }

    /* 增加遊戲框頂部的內距，把文字推下去 */
    #game-box {
        padding-top: 80px; /* 增加頂部空間，避免文字被按鈕蓋到 */

    }
    

    .achievements-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 20px;
    }

    .achievement-item {
        padding: 15px;
        background-color: #9EACB0;
        color: #142b49; 
        border: 2px solid #142b49;
        border-radius: 5px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: bold;
        opacity: 0.8; 
    }

    /* --- 已解鎖的狀態 */
    .achievement-item.unlocked {
        opacity: 1;
        border-color: #52656C;
        color: #142b49;
    }
    .achievement-item:hover, 
    .achievement-item.unlocked:hover {
        background-color: #52656C; /* 移上去背景變深 */
        color: #9EACB0;           /* 移上去文字變淺（反轉） */
        border-color: #52656C;
    }

    .modal-content {
        background-color: #9EACB0; 
        color: #142b49;            /* 標題文字顏色 */
        padding: 30px;
        border-radius: 10px;
        border: 3px solid #142b49;
        text-align: center;
        max-width: 90%;
        position: relative;
    }

    /* 關閉按鈕 [X] 的顏色 */
    .close-modal {
        color: #142b49;
        transition: color 0.2s;
    }
    .close-modal:hover {
        color: #52656C;
    }
        #end-buttons-container {
        display: none;          /* 預設隱藏，由 JS 控制顯示 */
        justify-content: center; /* 核心：讓內部的按鈕水平居中 */
        align-items: center;     /* 垂直居中 */
        gap: 15px;               /* 兩個按鈕之間的間距 */
        width: 100%;             /* 確保容器佔滿遊戲盒子的寬度 */
        margin-top: 20px;        /* 與上方文字保持距離 */
    }

    /*維持整齊外觀 */
    .end-btn {
        min-width: 120px; 
        padding: 10px 20px;
        
    }
    /*所有按鈕的基礎樣式 */
        #next-btn, 
        .option-btn, 
        #game-controls button, 
        #start-game-btn, 
        #collection-btn,
        .end-btn {
            padding: 10px 20px;
            background-color: transparent; /* 背景透明 */
            color: #52656C;              /* 文字：灰藍色 */
            border: 2px solid #142b49;    /* 邊框：深藍色 (增加層次感) */
            border-radius: 5px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;    /* 顏色切換的絲滑效果 */
            display: inline-block;
            outline: none;
        }

        /*統一滑鼠移上去 (Hover) 的相反顏色效果 */
        #next-btn:hover, 
        .option-btn:hover, 
        #game-controls button:hover, 
        #start-game-btn:hover, 
        #collection-btn:hover,
        .restart-btn:hover,
        .achieve-btn:hover {
            background-color: #52656C;    /* 背景填滿灰藍色 */
            color: #9EACB0;              /* 文字反轉成盒子的石灰色 */
            border-color: #52656C;       /* 邊框也同步色調 */
        }

        /*個別按鈕的微調*/

        /* 下一步按鈕：保留原本的漂浮動畫 */
        #next-btn {
            font-size: 1.2rem;
            animation: float 2s infinite;
        }

        /* 控制列小巧一點，並固定在左上角 */
        #game-controls {
            position: absolute;
            top: 15px; 
            left: 15px;
            display: flex; 
            gap: 10px;
        }

        #game-controls button {
            padding: 5px 12px;
            font-size: 1rem;
        }

        /* 結局收集館的網格按鈕：確保它們在彈窗內也遵循統一風格 */
        .achievement-item {
            border: 2px solid #142b49;
            color: #777; /* 未解鎖時稍微黯淡 */
            background-color: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        /* 結局收集館已解鎖的樣式 */
        .achievement-item.unlocked {
            border-color: #52656C;
            color: #52656C;
            background-color: transparent;
        }

        .achievement-item.unlocked:hover {
            background-color: #52656C;
            color: #9EACB0;
}
</style>

</head>
<body>

<div id="game-box">
    <div id="title-screen">
        <h1>落入異世界重生的老套劇情，此時你該如何破關？</h1>
        <button id="start-game-btn" class="option-btn" style="width:100%; margin-bottom:10px;">開始遊戲</button>
        <button id="collection-btn" class="option-btn" style="width:100%;">結局收集</button>
    </div>

    <div id="game-content" style="display: none;">
        <div id="game-controls">
            <button onclick="goHome()">首頁</button>
            <button onclick="toggleCollection()">結局收集</button>
        </div>
        <div id="text-display"></div>
        <button id="next-btn">▼</button>
        <div id="options-container" style="display: none;"></div>
        <div id="end-buttons-container">
            <button id="restart-game-btn" class="end-btn restart-btn">回到最初</button>
            <button id="achieve-btn" class="end-btn achieve-btn">解鎖結局</button>
        </div>
    </div>
</div>

<div id="achieve-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('achieve-modal')">&times;</span>
        <div class="achieve-title" style="color:#52656C; font-size:1.5rem; margin-bottom:15px;"></div>
        <img src="" alt="結局圖片">
    </div>
</div>

<div id="collection-screen" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('collection-screen')">&times;</span>
        <h2 style="color:#52656C;">結局收集館</h2>
        <div id="achievements-grid" class="achievements-grid"></div>
    </div>
</div>

<script>
    const gameData = {
        start: {
            
            plots: [
                "你昨天有些晚睡，只記得在房間閉上眼時似乎忘了關燈。",
                "但當你睡飽了，睜開眼時，映入眼簾的卻是刺眼的太陽光。",
                "「咦？」你困惑地望了望四周。",
                "「這裡不是熟悉的現代社會。」你能從四周的建築物感覺到。",
                "不妙。你覺得，自己好像落入了那老套的，重生異世界小說了。"
            ],
            choices: [
                { text: "站起身，總之先找個人問問看。", nextScene: "market" },
                { text: "重新閉上眼睛，嘗試說服自己這只是個夢。", nextText: "你睜開了眼睛，發現這並不是夢。", type: "end_dream" }
            ]
        },
        market: {
            plots: [
                "你拍拍身上的灰塵站了起來。不遠處似乎有個市集，人聲鼎沸。",
                "「嘿！那邊那個穿得很奇怪的傢伙！」一個粗獷的聲音叫住了你。"
            ],
            choices: [
                { text: "回頭看。", nextScene: "market_apple" },
                { text: "不理他。你想找一位比較溫和的人詢問。", nextScene: "market_women" }
            ]
        },
        market_apple: {
            plots: [
                "「看你在那邊探頭探腦，我雖然不能給你什麼，但送你一顆蘋果還是做得到的。」",
                "你還來不及反應，大叔就塞了一顆蘋果到你手裡。",
                "看起來很好吃。你不自覺地吞了一口口水。"
            ],
            choices: [
                { text: "收下蘋果。", nextScene: "market_thankyouuncle" },
                { text: "婉拒大叔的好意。", nextScene: "market_women" }
            ]
        },
        market_women: {
            plots: [
                "你又走了幾步，望見了一群正在採買的婦人們。",
                "「不好意思……」你出聲喊住他們。「請問……」",
                "不知為何，他們看到你後眼睛變亮了起來。你沒還組織好言語，婦人們便等不及般打斷你。",
                "「唉呦，這衣服布料真特別呢。年輕人，你是從哪得到的？」他們圍著你嘰嘰喳喳。",
                "你下意識後退了一步，卻在不知不覺間被圍住了，逃都逃不了。"
            ],
            choices: [
                { text: "乖乖留下來回答。", nextScene: "market_earnmoney" },
                { text: "再度逃跑。", nextScene: "market_shameonyou" } 
            ]
        },
        market_thankyouuncle: {
            plots: [
                "「謝謝大叔。」你道謝。",
                "大叔爽朗地揮揮手，「小事。祝你好運，年輕人。」",
                "異世界重生好像也沒那麼可怕。你樂觀地想。",
                "「我的異世界旅程，現在才開始！」"
            ],
            choices: [
                { text: "迎接異世界旅程。", nextText: "你收好蘋果。雖然路上肯定充滿波折，但你的異世界旅程，現在才開始！", type: "end_dream" }
            ]
        },
        market_earnmoney: {
            plots: [
                "「抱歉，我沒辦法解釋，但我能讓您們剪下一小塊布料回去研究。」",
                "「真的嗎！謝謝你啊，要是之後我們研究出來的話，錢肯定會分你一份的。」婦人們呵呵笑著，俐落地獲得布料後便揚長而去。",
                "後來，憑藉著婦人們對布料的豐富知識，你幸運地被他們帶飛，在異世界躺著賺大錢。"
            ],
            choices: [
                { text: "舒服的異世界生活", nextText: "誰說重生一定要打怪？藉著輕薄又透氣的布料及婦人們的智慧，你得以在異世界舒服地過生活。", type: "end_dream" }
            ]
        },
        market_shameonyou: {
            plots: [
                "你唯一熟練的只有逃跑技術。",
                "你什麼消息都沒有獲得。因為大叔很可怕所以不敢，因為婦人們太熱情所以也什麼都沒問到。",
                "唉……祝你好運囉，異世界新人 ^ ^"
            ],
            choices: [
                { text: "落荒而逃的專家", nextText: "懦弱的你對這個世界一無所知。", type: "end_dream" }
            ]
        }
    };

    let currentScene = "start"; 
    let currentPlotIndex = 0; 
    let unlockedAchievements = JSON.parse(localStorage.getItem("myGameAchieve")) || [];

    function renderPlot() {
    const scene = gameData[currentScene]; // 宣告一次即可
    const gameBox = document.getElementById("game-box");
    const textDisplay = document.getElementById("text-display");
    const nextBtn = document.getElementById("next-btn");
    const optionsContainer = document.getElementById("options-container");
    const endBtnContainer = document.getElementById("end-buttons-container");

    // 1. 處理背景切換
    if (scene.background) {
        gameBox.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url('${scene.background}')`;
        gameBox.style.backgroundSize = "cover";
        gameBox.style.backgroundPosition = "center";
    } else {
        // 如果該場景沒設定背景，可以選擇清空背景或是保留上一個背景
        // gameBox.style.backgroundImage = "none"; 
    }

    // 2. 初始化介面狀態
    optionsContainer.style.display = "none";
    endBtnContainer.style.display = "none";
    nextBtn.style.display = "inline-block";

    // 3. 顯示當前對話文字
    textDisplay.innerText = scene.plots[currentPlotIndex];

    // 4. 設定下一步按鈕邏輯
    nextBtn.onclick = () => {
        currentPlotIndex++;
        if (currentPlotIndex < scene.plots.length) {
            renderPlot(); 
        } else {
            showChoices(); 
        }
    };
}
    function showChoices() {
        const scene = gameData[currentScene];
        const textDisplay = document.getElementById("text-display");
        const optionsContainer = document.getElementById("options-container");
        const nextBtn = document.getElementById("next-btn");
        const endBtnContainer = document.getElementById("end-buttons-container");

        nextBtn.style.display = "none";
        const isEndScene = scene.choices[0] && scene.choices[0].type === "end_dream";

        if (isEndScene) {
            textDisplay.innerText = ""; 
        } else {
            textDisplay.innerText = "你該怎麼辦？";
        }

        optionsContainer.style.display = "flex";
        optionsContainer.innerHTML = "";

        scene.choices.forEach(item => {
            const btn = document.createElement("button");
            btn.innerText = item.text;
            btn.className = "option-btn";
            
            btn.onclick = () => {
                if (item.type === "end_dream") {
                    textDisplay.innerText = item.nextText || "遊戲結束";
                    optionsContainer.style.display = "none";
                    endBtnContainer.style.display = "flex"; 
                    
                    document.getElementById("restart-game-btn").onclick = () => location.reload();
                    document.getElementById("achieve-btn").onclick = openAchieve;
                } else if (item.nextScene) {
                    currentScene = item.nextScene;
                    currentPlotIndex = 0;
                    renderPlot();
                }
            };
            optionsContainer.appendChild(btn);
        });
    }

    function saveProgress(sceneId) {
        if (!unlockedAchievements.includes(sceneId)) {
            unlockedAchievements.push(sceneId);
            localStorage.setItem("myGameAchieve", JSON.stringify(unlockedAchievements));
        }
    }

    function openAchieve() {
        const modal = document.getElementById("achieve-modal");
        const modalImg = modal.querySelector("img");
        const title = modal.querySelector(".achieve-title");

        // 根據場景判斷標題
        if (currentScene === "market_earnmoney") {
            title.innerText = "結局：【阿姨帶你躺著賺大錢】",
            modalImg.src = "https://images.plurk.com/2hkgMtQMrLPqhV8etgBGc2.png";
        } else if (currentScene === "market_shameonyou") {
            title.innerText = "結局：【落荒而逃的專家】",
            modalImg.src = "https://images.plurk.com/534286nrSiHc7qN1yq1ovN.png";
        } else if (currentScene === "start") {
            title.innerText = "結局：【現實如此殘酷】",
            modalImg.src = "https://images.plurk.com/6Sd6ksBYuIezBIiYODezmm.png";
        } else {
            title.innerText = "結局：【充滿希望的旅程】",
            modalImg.src = "https://images.plurk.com/6DlGyCzT6QOjxrlngA9NuL.png";
        };
        
        // 修正點：開啟視窗時存檔
        saveProgress(currentScene);
        modal.classList.add("show");
    }

    function toggleCollection() {
        const screen = document.getElementById("collection-screen");
        const grid = document.getElementById("achievements-grid");
        const allEnds = [
            { id: "start", name: "現實如此殘酷" },
            { id: "market_thankyouuncle", name: "充滿希望的旅程" },
            { id: "market_earnmoney", name: "阿姨帶你躺著賺" },
            { id: "market_shameonyou", name: "落荒而逃的專家" }
        ];

        grid.innerHTML = allEnds.map(end => {
            const isUnlocked = unlockedAchievements.includes(end.id);
            return `<div class="achievement-item ${isUnlocked ? 'unlocked' : ''}">
                        ${isUnlocked ? '🏆 ' + end.name : '尚未解鎖'}
                    </div>`;
        }).join("");

        screen.classList.add("show");
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove("show");
    }

    function goHome() {
        if (confirm("確定要回到標題嗎？")) location.reload();
    }

    document.getElementById("start-game-btn").onclick = () => {
        document.getElementById("title-screen").style.display = "none";
        document.getElementById("game-content").style.display = "block";
        renderPlot();
    };

    document.getElementById("collection-btn").onclick = toggleCollection;
</script>
</body>
</html>
